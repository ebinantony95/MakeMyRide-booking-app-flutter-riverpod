name: make_my_ride
description: "BookMyRide — A premium ride-booking Flutter app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^17.2.0

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0

  # Networking
  dio: ^5.4.3+1

  # Maps & Location
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_map_location_marker: ^10.2.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  location: ^8.0.1

  # UI
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  pin_code_fields: ^8.0.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.0
  shared_preferences: ^2.3.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  cupertino_icons: ^1.0.8
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^2.4.5
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.3.0

flutter:
  uses-material-design: true
  # Fonts loaded via google_fonts package at runtime — no local TTF files needed
